name: 🚀 PIIC Pro Deployment (Phase 0)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-validation:
    name: 🛡️ Backend (API) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint and Test
        run: |
          npm run lint --workspace=@mantenimiento/api
          npm run test --workspace=@mantenimiento/api

  frontend-validation:
    name: 🎨 Frontend (Web) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint and Test
        run: |
          npm run lint --workspace=@mantenimiento/web
          npm run test --workspace=@mantenimiento/web

  database-validation:
    name: 🏛️ Database (SQL) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Validate SQL Schema
        run: npm run db:validate

  hostinger-deployment:
    name: 🚀 Deployment to Hostinger
    needs: [backend-validation, frontend-validation, database-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build Web Application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build --workspace=@mantenimiento/web

      - name: 📂 Generate Server .env
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> apps/api/.env
          echo "DB_USER=${{ secrets.DB_USER }}" >> apps/api/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> apps/api/.env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> apps/api/.env
          echo "DB_ENCRYPTION_KEY=${{ secrets.DB_ENCRYPTION_KEY }}" >> apps/api/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> apps/api/.env
          echo "NODE_ENV=production" >> apps/api/.env

      - name: 🚀 Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🚀 Deploy Web and API via Native LFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "set ftp:ssl-allow no; 
          open -u $FTP_USER,$FTP_PASSWORD $FTP_SERVER; 
          mirror -R ./apps/web/dist/ .;
          mirror -R --exclude-glob node_modules/ --exclude-glob tests/ --exclude-glob src/ --exclude-glob .git/ ./apps/api/ ./api_service/;
          quit"
