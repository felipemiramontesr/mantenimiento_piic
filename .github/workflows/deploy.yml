name: 🚀 PIIC Pro Deployment (Phase 0)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write
  statuses: write
  pull-requests: write

jobs:
  backend-validation:
    name: 🛡️ Backend (API) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint and Test
        run: |
          npm run lint --workspace=@mantenimiento/api
          npm run test --workspace=@mantenimiento/api
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'apps/api/test-results.xml'
          detailed_summary: true
          include_passed: true

  frontend-validation:
    name: 🎨 Frontend (Web) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Lint and Test
        run: |
          npm run lint --workspace=@mantenimiento/web
          npm run test --workspace=@mantenimiento/web
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'apps/web/test-results.xml'
          detailed_summary: true
          include_passed: true

  database-validation:
    name: 🏛️ Database (SQL) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Validate SQL Schema
        run: npm run db:validate

  hostinger-deployment:
    name: 🚀 Deployment to Hostinger
    needs: [backend-validation, frontend-validation, database-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build --workspace=@mantenimiento/web

      - name: Build Web Application
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build --workspace=@mantenimiento/web

      - name: 🚀 Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🚀 Deploy Web assets via Native LFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "set ftp:ssl-allow no; 
          open -u $FTP_USER,$FTP_PASSWORD $FTP_SERVER; 
          mirror -R ./apps/web/dist/ .;
          quit"
