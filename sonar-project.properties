sonar.projectKey=mantenimiento-piic-archon
sonar.projectName=Mantenimiento PIIC - Archon
sonar.projectVersion=78.100.19

sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.config.js,**/*.config.ts

sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Forensic Complexity Thresholds
sonar.cpd.ts.minimumLines=20
sonar.cpd.ts.minimumTokens=50
sonar.javascript.node.max-cognitive-complexity=15
